<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convenience Store 3D Walkthrough</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,30,0.85); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
    padding: 14px 24px; color: #ccc; font-size: 13px; z-index: 100;
    display: flex; gap: 20px; align-items: center;
  }
  #controls kbd {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 5px; padding: 2px 7px; font-family: monospace; font-size: 12px; color: #fff;
  }
  #info {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,30,0.85); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
    padding: 14px 28px; color: #fff; font-size: 18px; font-weight: 600;
    z-index: 100; letter-spacing: 0.5px;
  }
  #viewBtns {
    position: fixed; top: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 8px; z-index: 100;
  }
  .vbtn {
    background: rgba(10,10,30,0.85); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
    padding: 10px 18px; color: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .vbtn:hover { background: rgba(60,60,120,0.85); border-color: rgba(255,255,255,0.3); }
  .vbtn.active { background: rgba(80,80,180,0.85); border-color: rgba(150,150,255,0.5); }
</style>
</head>
<body>
<div id="info">Convenience Store — 3D Walkthrough</div>
<div id="viewBtns">
  <button class="vbtn active" onclick="setView('orbit')">Orbit View</button>
  <button class="vbtn" onclick="setView('topdown')">Top Down</button>
  <button class="vbtn" onclick="setView('interior')">Interior View</button>
  <button class="vbtn" onclick="setView('front')">Front View</button>
</div>
<div id="controls">
  <span><kbd>Left Click</kbd> + Drag to Rotate</span>
  <span><kbd>Right Click</kbd> + Drag to Pan</span>
  <span><kbd>Scroll</kbd> to Zoom</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ==================== SCENE ====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xd4dbe3);
scene.fog = new THREE.Fog(0xd4dbe3, 200, 500);
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dL = new THREE.DirectionalLight(0xffffff, 0.8);
dL.position.set(80,120,60); dL.castShadow = true;
dL.shadow.mapSize.set(2048,2048); dL.shadow.camera.near=1; dL.shadow.camera.far=300;
dL.shadow.camera.left=-120; dL.shadow.camera.right=120; dL.shadow.camera.top=120; dL.shadow.camera.bottom=-120;
scene.add(dL);
const fL = new THREE.DirectionalLight(0xb0c4de, 0.3); fL.position.set(-40,60,-30); scene.add(fL);
const iL1 = new THREE.PointLight(0xfff5e6, 0.8, 80); iL1.position.set(20,9,-15); scene.add(iL1);
const iL2 = new THREE.PointLight(0xfff5e6, 0.8, 80); iL2.position.set(-15,9,-15); scene.add(iL2);

// ==================== MATERIALS ====================
const wallMat = new THREE.MeshStandardMaterial({color:0xffffff, roughness:0.85});
const wallExtMat = new THREE.MeshStandardMaterial({color:0xe8e0d0, roughness:0.6}); // cream/beige like rendering
const floorMat = new THREE.MeshStandardMaterial({color:0xd9cfc2, roughness:0.6});
const floorTileMat = new THREE.MeshStandardMaterial({color:0xc8bfb2, roughness:0.5});
const ceilingMat = new THREE.MeshStandardMaterial({color:0xf5f5f0, roughness:0.9, side:2});
const gondolaMat = new THREE.MeshStandardMaterial({color:0x3a3a3a, roughness:0.4, metalness:0.3});
const shelfMat = new THREE.MeshStandardMaterial({color:0xeeeeee, roughness:0.5});
const glassMat = new THREE.MeshStandardMaterial({color:0xaaddff, transparent:true, opacity:0.25, roughness:0.1});
const groundMat = new THREE.MeshStandardMaterial({color:0x888888, roughness:0.9});
const roofMat = new THREE.MeshStandardMaterial({color:0x8b7d6b, roughness:0.8});
const signMat = new THREE.MeshStandardMaterial({color:0xcc2222, roughness:0.4, metalness:0.3});
const doorMat = new THREE.MeshStandardMaterial({color:0x555555, roughness:0.3, metalness:0.4});
const bevFrameMat = new THREE.MeshStandardMaterial({color:0x2a2a2a, roughness:0.3, metalness:0.5});
const bevBodyMat = new THREE.MeshStandardMaterial({color:0xe0e4e8, roughness:0.4, metalness:0.3});
const bevGlassMat = new THREE.MeshStandardMaterial({color:0x99ccee, transparent:true, opacity:0.28, roughness:0.02});
const hotGlassMat = new THREE.MeshStandardMaterial({color:0xcceeff, transparent:true, opacity:0.3, roughness:0.05});
const hotFrameMat = new THREE.MeshStandardMaterial({color:0x333333, roughness:0.3, metalness:0.5});
const trayMat = new THREE.MeshStandardMaterial({color:0xc0c0c0, roughness:0.2, metalness:0.6});
const skinA = new THREE.MeshStandardMaterial({color:0xe8b89d, roughness:0.8});
const skinB = new THREE.MeshStandardMaterial({color:0x8d5524, roughness:0.8});
const skinC = new THREE.MeshStandardMaterial({color:0xc68642, roughness:0.8});

// ==================== DIMENSIONS ====================
const W=80.5, D=69, H=12, wallT=0.5;
const ox=-W/2, oz=-D/2;
const backWallZ = oz + 14; // prep kitchen divider

// ==================== HELPERS ====================
function mkWall(x,z,w,d,h,mat){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h||H,d),mat||wallMat);
  m.position.set(x+w/2,(h||H)/2,z+d/2); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m;
}
function mkBox(x,y,z,w,h,d,mat){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y+h/2,z); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m;
}

// ==================== GROUND / FLOOR / CEILING ====================
const gnd=new THREE.Mesh(new THREE.PlaneGeometry(400,400),groundMat);
gnd.rotation.x=-Math.PI/2; gnd.position.y=-0.1; gnd.receiveShadow=true; scene.add(gnd);
for(let i=0;i<8;i++){const l=new THREE.Mesh(new THREE.PlaneGeometry(0.3,18),new THREE.MeshStandardMaterial({color:0xcccccc}));l.rotation.x=-Math.PI/2;l.position.set(ox+10+i*9,0.01,oz+D+20);scene.add(l);}

const fl=new THREE.Mesh(new THREE.PlaneGeometry(W,D),floorMat);
fl.rotation.x=-Math.PI/2; fl.receiveShadow=true; scene.add(fl);
for(let ix=0;ix<W;ix+=4)for(let iz=0;iz<D;iz+=4)if((Math.floor(ix/4)+Math.floor(iz/4))%2===0){
  const t=new THREE.Mesh(new THREE.PlaneGeometry(4,4),floorTileMat);t.rotation.x=-Math.PI/2;t.position.set(ox+ix+2,0.02,oz+iz+2);t.receiveShadow=true;scene.add(t);
}

const cl=new THREE.Mesh(new THREE.PlaneGeometry(W,D),ceilingMat);
cl.rotation.x=Math.PI/2; cl.position.y=H; scene.add(cl);
for(let ix=0;ix<4;ix++)for(let iz=0;iz<3;iz++){
  const f=new THREE.Mesh(new THREE.BoxGeometry(4,0.3,1.5),new THREE.MeshStandardMaterial({color:0xffffee,emissive:0xffffdd,emissiveIntensity:0.5}));
  f.position.set(ox+12+ix*18,H-0.2,oz+12+iz*20);scene.add(f);
}

// ==================== EXTERIOR WALLS ====================
mkWall(ox,oz,W,wallT,H,wallExtMat);          // back
mkWall(ox+W-wallT,oz,wallT,D,H,wallExtMat);  // right
mkWall(ox,oz,wallT,D,H,wallExtMat);           // left
const sfLeft=20, sfRight=54, sfW=sfRight-sfLeft;
mkWall(ox,oz+D-wallT,sfLeft,wallT,H,wallExtMat);
mkWall(ox+sfRight,oz+D-wallT,W-sfRight,wallT,H,wallExtMat);
const hdr=mkWall(ox+sfLeft,oz+D-wallT,sfW,wallT,2,wallExtMat); hdr.position.y=H-1;

// Storefront glass & doors
for(let i=0;i<4;i++){
  const pw=sfW/4;
  const p=new THREE.Mesh(new THREE.PlaneGeometry(pw-0.5,H-3),glassMat);
  p.position.set(ox+sfLeft+pw*i+pw/2,(H-3)/2+0.5,oz+D-0.2);scene.add(p);
  const fr=new THREE.Mesh(new THREE.BoxGeometry(0.3,H-2,0.3),new THREE.MeshStandardMaterial({color:0x444444,metalness:0.5}));
  fr.position.set(ox+sfLeft+pw*i,(H-2)/2+0.5,oz+D-0.2);scene.add(fr);
}
const doorX=ox+sfLeft+sfW/2;
{const _m=new THREE.Mesh(new THREE.BoxGeometry(6,8,0.4),doorMat);_m.position.set(doorX,4,oz+D);scene.add(_m);}
for(let s=-1;s<=1;s+=2){const dg=new THREE.Mesh(new THREE.PlaneGeometry(2.5,6.5),glassMat);dg.position.set(doorX+s*1.5,4,oz+D+0.25);scene.add(dg);}

// ==================== BACK DIVIDER WALL ====================
// Spans full width — coolers sit in front of it on the left portion
mkWall(ox, backWallZ, W, wallT, H, wallMat);

// ==================== COOLER HELPERS ====================
const bevColors=[0xcc0000,0x0044aa,0x00aa44,0xffcc00,0xff6600,0x8800cc];
const cH=8, cD=3;

function coolerZ(cx,cz,n,dir){
  // Body spans X, doors face Z direction (dir=1 or -1)
  const dw=3,tw=n*dw;
  mkBox(cx,0,cz,tw,cH,cD,bevBodyMat);
  mkBox(cx,cH,cz,tw+0.3,0.4,cD+0.2,bevFrameMat);
  mkBox(cx,0,cz,tw+0.3,0.5,cD+0.2,bevFrameMat);
  for(let d=0;d<n;d++){
    const dx=cx-tw/2+dw/2+d*dw, fz=cz+dir*(cD/2+0.05);
    const df=new THREE.Mesh(new THREE.BoxGeometry(dw+0.15,cH-0.5,0.2),bevFrameMat);df.position.set(dx,cH/2,fz);scene.add(df);
    const gp=new THREE.Mesh(new THREE.PlaneGeometry(dw-0.6,cH-1.5),bevGlassMat);gp.position.set(dx,cH/2+0.2,fz+dir*0.15);scene.add(gp);
    const h=new THREE.Mesh(new THREE.BoxGeometry(0.12,3,0.3),new THREE.MeshStandardMaterial({color:0x888888,metalness:0.7,roughness:0.2}));
    h.position.set(dx+dw/2-0.5,cH/2,fz+dir*0.3);scene.add(h);
    for(let s=0;s<5;s++){
      const sy=1+s*1.4;
      const sh=new THREE.Mesh(new THREE.BoxGeometry(dw-0.4,0.08,cD-0.6),new THREE.MeshStandardMaterial({color:0xd0d0d0}));
      sh.position.set(dx,sy,cz);scene.add(sh);
      for(let b=0;b<4;b++){
        const bt=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.25,0.9,6),new THREE.MeshStandardMaterial({color:bevColors[(d+s+b)%6],roughness:0.4}));
        bt.position.set(dx-1+b*0.65,sy+0.5,cz+dir*0.5);scene.add(bt);
      }
    }
  }
  {const _m=new THREE.PointLight(0x88bbff,0.2,10);_m.position.set(cx,cH-1,cz);scene.add(_m);}
}

function coolerX(cx,cz,n,dir){
  // Body spans Z, doors face X direction (dir=1 or -1)
  const dw=3,tl=n*dw;
  mkBox(cx,0,cz,cD,cH,tl,bevBodyMat);
  mkBox(cx,cH,cz,cD+0.2,0.4,tl+0.3,bevFrameMat);
  mkBox(cx,0,cz,cD+0.2,0.5,tl+0.3,bevFrameMat);
  for(let d=0;d<n;d++){
    const dz=cz-tl/2+dw/2+d*dw, fx=cx+dir*(cD/2+0.05);
    const df=new THREE.Mesh(new THREE.BoxGeometry(0.2,cH-0.5,dw+0.15),bevFrameMat);df.position.set(fx,cH/2,dz);scene.add(df);
    const gp=new THREE.Mesh(new THREE.PlaneGeometry(dw-0.6,cH-1.5),bevGlassMat);
    gp.rotation.y=Math.PI/2;gp.position.set(fx+dir*0.15,cH/2+0.2,dz);scene.add(gp);
    const h=new THREE.Mesh(new THREE.BoxGeometry(0.3,3,0.12),new THREE.MeshStandardMaterial({color:0x888888,metalness:0.7,roughness:0.2}));
    h.position.set(fx+dir*0.3,cH/2,dz+dw/2-0.5);scene.add(h);
    for(let s=0;s<5;s++){
      const sy=1+s*1.4;
      const sh=new THREE.Mesh(new THREE.BoxGeometry(cD-0.6,0.08,dw-0.4),new THREE.MeshStandardMaterial({color:0xd0d0d0}));
      sh.position.set(cx,sy,dz);scene.add(sh);
      for(let b=0;b<4;b++){
        const bt=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.25,0.9,6),new THREE.MeshStandardMaterial({color:bevColors[(d+s+b)%6],roughness:0.4}));
        bt.position.set(cx+dir*0.5,sy+0.5,dz-1+b*0.65);scene.add(bt);
      }
    }
  }
  {const _m=new THREE.PointLight(0x88bbff,0.2,10);_m.position.set(cx,cH-1,cz);scene.add(_m);}
}

// ==================== RED: L-SHAPED COOLER DOORS ====================
// Full continuous wall of glass doors — tight L-shape with only a small 2-door gap for hallway
// Each door is 3' wide.

// BACK WALL coolers — sit in front of back divider, doors face +Z into store
coolerZ(ox+15, backWallZ+2, 9, 1);

// LEFT WALL — starts right at back divider level, runs down to entrance
// Upper section: 9 doors starting from backWallZ+2 downward
coolerX(ox+2.5, backWallZ+15.5, 9, 1);

// === HALLWAY GAP: 6' (2 door widths) for restroom access ===

// Lower section: 10 doors continuing after gap, ending before the front wall
// Upper section ends at backWallZ+15.5+13.5 = oz+43. Gap = 6'. Lower starts at oz+49.
// Front wall at oz+69. So lower section = oz+49 to oz+67 = 18' = 6 doors, centered at oz+58
coolerX(ox+2.5, backWallZ+15.5+13.5+6+9, 6, 1);

// Restrooms are behind the back divider wall — no walls visible on the retail floor

// ==================== YELLOW: SHOW KITCHEN — CURVED GLASS HOT FOOD CASES ====================
// Like the reference: stainless steel base, curved glass front, warm-lit shelves with wrapped food
const fcStartX = ox+30, fcEndX = ox+W-10, fcW = fcEndX-fcStartX;
const fcZ = backWallZ+1.5;
const ssMat = new THREE.MeshStandardMaterial({color:0xb0b0b0, roughness:0.15, metalness:0.7}); // stainless steel

// Stainless steel base counter
mkBox(fcStartX+fcW/2, 0, fcZ, fcW, 2.5, 3, ssMat);

// Individual curved glass display cases on top
for(let i=0; i<5; i++){
  const cx = fcStartX + 4 + i * (fcW-6)/5;
  const cw = (fcW-8)/5 - 0.5;
  const baseY = 2.5, caseH = 2.2;

  // Back panel (stainless)
  mkBox(cx, baseY, fcZ-1.2, cw, caseH, 0.15, ssMat);

  // Curved glass front — approximate with 3 angled panels
  for(let seg=0; seg<3; seg++){
    const angle = -0.3 + seg * 0.3;
    const segH = caseH / 3;
    const gp = new THREE.Mesh(new THREE.PlaneGeometry(cw, segH+0.1), hotGlassMat);
    gp.position.set(cx, baseY + segH*seg + segH/2, fcZ + 0.8 - seg*0.15);
    gp.rotation.x = angle;
    scene.add(gp);
  }
  // Top glass panel
  const top = new THREE.Mesh(new THREE.PlaneGeometry(cw, 1.5), hotGlassMat);
  top.rotation.x = -Math.PI/4;
  top.position.set(cx, baseY+caseH+0.2, fcZ);
  scene.add(top);

  // Side glass
  for(let s=-1; s<=1; s+=2){
    const sg = new THREE.Mesh(new THREE.PlaneGeometry(2, caseH), hotGlassMat);
    sg.rotation.y = Math.PI/2;
    sg.position.set(cx + s*cw/2, baseY + caseH/2, fcZ);
    scene.add(sg);
  }

  // Shelves inside (3 levels) with wrapped food
  for(let sh=0; sh<3; sh++){
    const sy = baseY + 0.3 + sh * 0.7;
    // Shelf
    mkBox(cx, sy, fcZ, cw-0.5, 0.06, 1.5, ssMat);
    // Wrapped food items (golden/brown packages)
    const fColors = [0xd4890a, 0xc47a15, 0xe8a020, 0xb8860b];
    for(let fi=0; fi<4; fi++){
      const pkg = new THREE.Mesh(new THREE.BoxGeometry(cw/5, 0.3, 0.8),
        new THREE.MeshStandardMaterial({color:fColors[(i+sh+fi)%4], roughness:0.6}));
      pkg.position.set(cx - cw/3 + fi*(cw/5+0.2), sy+0.22, fcZ+0.1);
      scene.add(pkg);
    }
  }

  // Warm light inside
  const wl = new THREE.PointLight(0xffaa44, 0.3, 6);
  wl.position.set(cx, baseY+caseH-0.3, fcZ);
  scene.add(wl);

  // Stainless frame edges
  for(let s=-1; s<=1; s+=2){
    mkBox(cx+s*cw/2, baseY, fcZ+0.4, 0.1, caseH, 0.1, hotFrameMat);
  }
}

// ==================== YELLOW: CASHIER POS COUNTER (right side) ====================
// Like reference: long dark counter, candy/impulse shelves on customer side, POS on top
const posX = ox+W-6;
const posSZ = oz+28, posEZ = oz+D-8, posL = posEZ-posSZ;
const posBlack = new THREE.MeshStandardMaterial({color:0x1a1a1a, roughness:0.4, metalness:0.2});
const posTop = new THREE.MeshStandardMaterial({color:0x2a2a2a, roughness:0.2, metalness:0.3});

// Main counter body
mkBox(posX, 0, posSZ+posL/2, 4, 2.8, posL, posBlack);
// Counter top surface (slightly wider)
mkBox(posX, 2.8, posSZ+posL/2, 4.5, 0.2, posL+0.5, posTop);

// Customer-facing impulse item shelves (candy, gum, mints etc.)
const impulseMat = new THREE.MeshStandardMaterial({color:0x222222, roughness:0.5});
for(let sh=0; sh<3; sh++){
  const sy = 0.3 + sh * 0.85;
  // Shelf
  mkBox(posX-2.2, sy, posSZ+posL/2, 0.08, 0.08, posL-1, impulseMat);
  // Candy/impulse items on shelf
  const candyColors = [0xcc0000,0x0066cc,0xffaa00,0x00aa44,0xff4488,0x8844cc,0xff6600,0x44bbcc];
  for(let c=0; c<Math.floor(posL/1.2); c++){
    const cz = posSZ + 1 + c * 1.2;
    const candy = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 0.9),
      new THREE.MeshStandardMaterial({color:candyColors[(sh+c)%8], roughness:0.6}));
    candy.position.set(posX-2.2, sy+0.35, cz);
    scene.add(candy);
  }
}

// Shelving behind counter (against right wall — cigarettes, tobacco, liquor)
const behindMat = new THREE.MeshStandardMaterial({color:0x3a3a3a, roughness:0.4, metalness:0.2});
for(let i=0;i<4;i++){
  // Tall shelving unit
  mkBox(ox+W-1.5, 0, posSZ+3+i*(posL/4), 2, 7, posL/4-1, behindMat);
  // Products on shelves (colorful packs)
  for(let sh=0;sh<5;sh++){
    for(let p=0;p<3;p++){
      const prod = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, posL/4-2),
        new THREE.MeshStandardMaterial({color:[0xcc0000,0xffcc00,0x00aa44,0x2266cc,0xff6600][(i+sh+p)%5], roughness:0.5}));
      prod.position.set(ox+W-1.5-0.3+p*0.6, 1+sh*1.2, posSZ+3+i*(posL/4));
      scene.add(prod);
    }
  }
}

// POS Registers on counter
const pScrMat = new THREE.MeshStandardMaterial({color:0x111111,roughness:0.2,metalness:0.5});
const pDspMat = new THREE.MeshStandardMaterial({color:0x2244aa,emissive:0x112244,emissiveIntensity:0.4});
for(let r=0;r<3;r++){
  const rz=posSZ+6+r*10, ry=3;
  // Monitor base
  const base = new THREE.Mesh(new THREE.BoxGeometry(0.8,0.2,0.8),pScrMat);
  base.position.set(posX,ry+0.1,rz);scene.add(base);
  // Neck
  const neck = new THREE.Mesh(new THREE.BoxGeometry(0.15,1.0,0.15),pScrMat);
  neck.position.set(posX,ry+0.7,rz);scene.add(neck);
  // Screen (faces -X into store)
  const scr=new THREE.Mesh(new THREE.BoxGeometry(0.12,1.3,1.8),pScrMat);
  scr.position.set(posX-0.2,ry+1.6,rz);scr.castShadow=true;scene.add(scr);
  // Display glow
  const dsp=new THREE.Mesh(new THREE.PlaneGeometry(1.5,1.0),pDspMat);
  dsp.rotation.y=-Math.PI/2;dsp.position.set(posX-0.3,ry+1.6,rz);scene.add(dsp);
  // Card reader
  const rd = new THREE.Mesh(new THREE.BoxGeometry(0.8,0.3,0.5),
    new THREE.MeshStandardMaterial({color:0x222222,roughness:0.3,metalness:0.4}));
  rd.position.set(posX-1.5,ry+0.15,rz);scene.add(rd);
  // Reader screen
  const rs=new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.35),
    new THREE.MeshStandardMaterial({color:0x44aa66,emissive:0x22aa44,emissiveIntensity:0.3}));
  rs.rotation.y=-Math.PI/2;rs.position.set(posX-1.9,ry+0.35,rz);scene.add(rs);
  // Scanner
  const scanner = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.5,0.3),
    new THREE.MeshStandardMaterial({color:0x333333,roughness:0.3,metalness:0.3}));
  scanner.position.set(posX+0.8,ry+0.25,rz+1);scene.add(scanner);
}

// ==================== YELLOW: COFFEE + FOUNTAIN SODA ISLAND (bottom-right near entrance) ====================
// Like reference: dark island counter, multiple coffee urn dispensers, condiment area, cups

// ==================== GONDOLA SHELVING ====================
// Split into 2 sections per row with a 3' aisle gap between them
const gRows=5, gSecLen=12, gGap=3, gSpc=7, gSX=ox+14, gSZ=oz+24;
const pegMat = new THREE.MeshStandardMaterial({color:0x1a2a3a, roughness:0.6, metalness:0.3});
const shelfEdgeMat = new THREE.MeshStandardMaterial({color:0xcc3300, roughness:0.5});
const gondEndMat = new THREE.MeshStandardMaterial({color:0x1a1a1a, roughness:0.4, metalness:0.3});

function makeGondolaSection(sx, gz, sLen, row, sec){
  // Pegboard spine
  const sp=new THREE.Mesh(new THREE.BoxGeometry(sLen,5.8,0.15),pegMat);
  sp.position.set(sx+sLen/2,2.9,gz);sp.castShadow=true;scene.add(sp);
  // Top cap
  mkBox(sx+sLen/2, 5.8, gz, sLen, 0.15, 0.6, gondEndMat);
  // Shelves (5 levels, both sides)
  for(let s=0;s<5;s++){
    const sy=0.5+s*1.1;
    for(let side=-1;side<=1;side+=2){
      const sh=new THREE.Mesh(new THREE.BoxGeometry(sLen,0.08,1.2),shelfMat);
      sh.position.set(sx+sLen/2,sy,gz+side*0.75);sh.receiveShadow=true;scene.add(sh);
      const edge=new THREE.Mesh(new THREE.BoxGeometry(sLen,0.15,0.04),shelfEdgeMat);
      edge.position.set(sx+sLen/2,sy+0.04,gz+side*1.35);scene.add(edge);
    }
  }
  // End caps
  for(let e=0;e<=1;e++){
    const ex = sx + e*sLen;
    const ec=new THREE.Mesh(new THREE.BoxGeometry(0.15,5.8,3.2),gondEndMat);
    ec.position.set(ex,2.9,gz);ec.castShadow=true;scene.add(ec);
    for(let es=0;es<4;es++){
      const esy = 0.8+es*1.3;
      mkBox(ex+(e===0?-0.7:0.7), esy, gz, 1.2, 0.06, 2.5, shelfMat);
      for(let ep=0;ep<3;ep++){
        const epr = new THREE.Mesh(new THREE.BoxGeometry(0.9,0.8,0.7),
          new THREE.MeshStandardMaterial({color:[0xcc0000,0xffaa00,0x0066cc,0x00aa44,0xff4488][(row+es+ep+sec)%5], roughness:0.5}));
        epr.position.set(ex+(e===0?-0.7:0.7), esy+0.46, gz-0.8+ep*0.8);scene.add(epr);
      }
    }
    const signColors = [0xcc2222,0x2255aa,0xee8800,0x22aa44,0x8833cc];
    const ecSign = new THREE.Mesh(new THREE.BoxGeometry(0.1,1,2.5),
      new THREE.MeshStandardMaterial({color:signColors[(row+sec+e)%5], roughness:0.4}));
    ecSign.position.set(ex+(e===0?-0.8:0.8), 5.5, gz);scene.add(ecSign);
  }
  // Products (both sides)
  const pColors=[0xcc3333,0x3366cc,0x33aa55,0xeeaa22,0x9944aa,0xdd6633,0x44bbcc,0xff6688];
  for(let s=0;s<5;s++){
    for(let side=-1;side<=1;side+=2){
      for(let p=0;p<Math.floor(sLen/2.8);p++){
        const pw=sLen/Math.floor(sLen/2.8);
        const pr=new THREE.Mesh(new THREE.BoxGeometry(pw-0.3,0.85,0.9),
          new THREE.MeshStandardMaterial({color:pColors[(row+s+p+sec+Math.abs(side))%8],roughness:0.6}));
        pr.position.set(sx+pw*p+pw/2,0.5+s*1.1+0.5,gz+side*0.75);scene.add(pr);
      }
    }
  }
}

for(let row=0;row<gRows;row++){
  const gz=gSZ+row*gSpc;
  // Section A (left half)
  makeGondolaSection(gSX, gz, gSecLen, row, 0);
  // Section B (right half, after gap)
  makeGondolaSection(gSX+gSecLen+gGap, gz, gSecLen, row, 1);
}

function mkPerson(px,py,pz,rot,shirt,pants,skin,isEmp){
  const g=new THREE.Group();
  const pantsMat=new THREE.MeshStandardMaterial({color:pants,roughness:0.7});
  const shirtMat=new THREE.MeshStandardMaterial({color:shirt,roughness:0.6});
  // Legs
  for(let s=-1;s<=1;s+=2){const l=new THREE.Mesh(new THREE.BoxGeometry(0.5,2.5,0.5),pantsMat);l.position.set(s*0.3,1.25,0);l.castShadow=true;g.add(l);}
  // Torso
  const t=new THREE.Mesh(new THREE.BoxGeometry(1.2,1.8,0.7),shirtMat);t.position.set(0,3.4,0);t.castShadow=true;g.add(t);
  // Head
  const hd=new THREE.Mesh(new THREE.SphereGeometry(0.45,8,8),skin);hd.position.set(0,4.75,0);hd.castShadow=true;g.add(hd);
  // Hair
  const hr=new THREE.Mesh(new THREE.SphereGeometry(0.47,8,4,0,Math.PI*2,0,Math.PI/2),new THREE.MeshStandardMaterial({color:isEmp?0x222222:0x4a3728,roughness:0.8}));
  hr.position.set(0,4.85,0);g.add(hr);
  // Arms
  for(let s=-1;s<=1;s+=2){
    const a=new THREE.Mesh(new THREE.BoxGeometry(0.35,1.6,0.35),shirtMat);a.position.set(s*0.85,3.2,0);a.castShadow=true;g.add(a);
    const h=new THREE.Mesh(new THREE.SphereGeometry(0.18,6,6),skin);h.position.set(s*0.85,2.3,0);g.add(h);
  }
  // Apron for employees
  if(isEmp){const ap=new THREE.Mesh(new THREE.BoxGeometry(1.1,1.5,0.1),new THREE.MeshStandardMaterial({color:0x1a5c1a,roughness:0.7}));ap.position.set(0,3,0.4);g.add(ap);}
  g.position.set(px,py,pz); g.rotation.y=rot; scene.add(g); return g;
}

// Seated customers on bar stools (3 of the 6 stools occupied, facing the window/outside)
function mkSeatedPerson(px, pz, rot, shirt, pants, skin){
  const g = new THREE.Group();
  const pantsMat = new THREE.MeshStandardMaterial({color:pants, roughness:0.7});
  const shirtMat = new THREE.MeshStandardMaterial({color:shirt, roughness:0.6});
  // Legs (bent at seat level, hanging down)
  for(let s=-1;s<=1;s+=2){
    // Upper leg (horizontal on seat)
    const ul = new THREE.Mesh(new THREE.BoxGeometry(0.45,0.45,0.8), pantsMat);
    ul.position.set(s*0.25, 2.4, -0.3); g.add(ul);
    // Lower leg (hanging down)
    const ll = new THREE.Mesh(new THREE.BoxGeometry(0.4,1.5,0.4), pantsMat);
    ll.position.set(s*0.25, 1.5, -0.6); g.add(ll);
    // Shoe
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.2,0.6),
      new THREE.MeshStandardMaterial({color:0x222222, roughness:0.5}));
    shoe.position.set(s*0.25, 0.7, -0.5); g.add(shoe);
  }
  // Torso
  const torso = new THREE.Mesh(new THREE.BoxGeometry(1.1,1.7,0.6), shirtMat);
  torso.position.set(0, 3.6, -0.1); torso.castShadow = true; g.add(torso);
  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.42,8,8), skin);
  head.position.set(0, 4.85, -0.1); head.castShadow = true; g.add(head);
  // Hair
  const hair = new THREE.Mesh(new THREE.SphereGeometry(0.44,8,4,0,Math.PI*2,0,Math.PI/2),
    new THREE.MeshStandardMaterial({color:0x3a2718, roughness:0.8}));
  hair.position.set(0, 4.95, -0.1); g.add(hair);
  // Arms (resting on counter)
  for(let s=-1;s<=1;s+=2){
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.3,1.4,0.3), shirtMat);
    arm.position.set(s*0.75, 3.3, 0.1); g.add(arm);
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.15,6,6), skin);
    hand.position.set(s*0.75, 2.6, 0.3); g.add(hand);
  }
  g.position.set(px, 0, pz); g.rotation.y = rot;
  scene.add(g); return g;
}

// Two stacks of 5 pumps each, under a large canopy in front of the store
const pumpCanopyX = doorX;
const pumpCanopyZ = oz + D + 35; // well in front of store
const pumpCanopyW = 50;
const pumpCanopyD = 24;
const pumpCanopyH = 16;

// Canopy structure (tall flat roof on columns)
const gcMat = new THREE.MeshStandardMaterial({color:0xdddddd, roughness:0.3, metalness:0.3});
const gcRoofMat = new THREE.MeshStandardMaterial({color:0xcc2222, roughness:0.4, metalness:0.2}); // red to match store

// Canopy roof
const gcRoof = new THREE.Mesh(new THREE.BoxGeometry(pumpCanopyW, 0.8, pumpCanopyD), gcRoofMat);
gcRoof.position.set(pumpCanopyX, pumpCanopyH, pumpCanopyZ);
gcRoof.castShadow = true; scene.add(gcRoof);

// Canopy fascia band (darker red trim)
mkBox(pumpCanopyX, pumpCanopyH-1, pumpCanopyZ, pumpCanopyW+0.5, 1.2, pumpCanopyD+0.5,
  new THREE.MeshStandardMaterial({color:0xaa1a1a, roughness:0.4, metalness:0.2}));

// Canopy columns (4 tall steel columns)
const colPositions = [
  [-pumpCanopyW/2+3, -pumpCanopyD/2+2],
  [pumpCanopyW/2-3, -pumpCanopyD/2+2],
  [-pumpCanopyW/2+3, pumpCanopyD/2-2],
  [pumpCanopyW/2-3, pumpCanopyD/2-2]
];
for(const [cx,cz] of colPositions){
  const col = new THREE.Mesh(new THREE.BoxGeometry(1.5, pumpCanopyH, 1.5), gcMat);
  col.position.set(pumpCanopyX+cx, pumpCanopyH/2, pumpCanopyZ+cz);
  col.castShadow = true; scene.add(col);
}

// Canopy underside lights
for(let lx=-2;lx<=2;lx++){
  for(let lz=-1;lz<=1;lz++){
    const cl = new THREE.PointLight(0xffffff, 0.15, 15);
    cl.position.set(pumpCanopyX+lx*10, pumpCanopyH-1.5, pumpCanopyZ+lz*8);
    scene.add(cl);
  }
}

// Gas pump islands and pumps
const pumpMat = new THREE.MeshStandardMaterial({color:0xdddddd, roughness:0.3, metalness:0.4});
const pumpScreenMat = new THREE.MeshStandardMaterial({color:0x111111, roughness:0.2, metalness:0.3});
const pumpAccentMat = new THREE.MeshStandardMaterial({color:0xcc2222, roughness:0.4});
const islandMat = new THREE.MeshStandardMaterial({color:0xbbbbbb, roughness:0.5});

function makeGasPump(px, pz, facingDir){
  // Island base
  // Pump body
  const body = new THREE.Mesh(new THREE.BoxGeometry(2, 5, 1.5), pumpMat);
  body.position.set(px, 2.5, pz); body.castShadow = true; scene.add(body);
  // Screen area
  const screen = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.2, 0.1), pumpScreenMat);
  screen.position.set(px, 4, pz+facingDir*0.8); scene.add(screen);
  // Screen glow
  const glow = new THREE.Mesh(new THREE.PlaneGeometry(1.1, 0.8),
    new THREE.MeshStandardMaterial({color:0x44aaff, emissive:0x2288cc, emissiveIntensity:0.3}));
  glow.position.set(px, 4, pz+facingDir*0.85);
  scene.add(glow);
  // Red accent stripe
  const stripe = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.3, 1.6), pumpAccentMat);
  stripe.position.set(px, 3, pz); scene.add(stripe);
  // Nozzle holders (3 hose slots)
  for(let n=-1;n<=1;n++){
    const nozzle = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.3),
      new THREE.MeshStandardMaterial({color:0x333333, roughness:0.4, metalness:0.5}));
    nozzle.position.set(px+n*0.6, 2.5, pz+facingDir*0.8);
    scene.add(nozzle);
    // Hose
    const hose = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1.5, 6),
      new THREE.MeshStandardMaterial({color:0x111111, roughness:0.6}));
    hose.position.set(px+n*0.6, 1.5, pz+facingDir*0.9);
    hose.rotation.z = 0.3*n;
    scene.add(hose);
  }
  // Pump top
  mkBox(px, 5, pz, 2.1, 0.3, 1.6, pumpAccentMat);
}

// Stack 1 (left): 5 pumps in a row
const stack1X = pumpCanopyX - 12;
const stack1Z = pumpCanopyZ;
// Island base for stack 1
mkBox(stack1X, 0, stack1Z, 3, 0.5, 22, islandMat);
for(let i=0;i<5;i++){
  makeGasPump(stack1X, stack1Z-8+i*4, 1);
}

// Stack 2 (right): 5 pumps in a row
const stack2X = pumpCanopyX + 12;
const stack2Z = pumpCanopyZ;
mkBox(stack2X, 0, stack2Z, 3, 0.5, 22, islandMat);
for(let i=0;i<5;i++){
  makeGasPump(stack2X, stack2Z-8+i*4, 1);
}

// Parking lot surface under canopy
const parkingMat = new THREE.MeshStandardMaterial({color:0x555555, roughness:0.8});
const parking = new THREE.Mesh(new THREE.PlaneGeometry(pumpCanopyW+20, pumpCanopyD+30), parkingMat);
parking.rotation.x = -Math.PI/2;
parking.position.set(pumpCanopyX, 0.01, pumpCanopyZ);
parking.receiveShadow = true;
scene.add(parking);

// Cars in parking area (simple box cars)
function makeCar(cx, cz, rot, bodyColor){
  const g = new THREE.Group();
  const bMat = new THREE.MeshStandardMaterial({color:bodyColor, roughness:0.3, metalness:0.4});
  // Body
  const bd = new THREE.Mesh(new THREE.BoxGeometry(6, 2, 3), bMat);
  bd.position.set(0, 1.5, 0); bd.castShadow = true; g.add(bd);
  // Cabin
  const cab = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.5, 2.8),
    new THREE.MeshStandardMaterial({color:0x88aabb, transparent:true, opacity:0.4, roughness:0.1}));
  cab.position.set(-0.3, 3, 0); g.add(cab);
  // Wheels
  const wheelMat = new THREE.MeshStandardMaterial({color:0x222222, roughness:0.6});
  for(let wx=-1;wx<=1;wx+=2) for(let wz=-1;wz<=1;wz+=2){
    const w = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.4, 8), wheelMat);
    w.rotation.x = Math.PI/2;
    w.position.set(wx*2, 0.6, wz*1.6); g.add(w);
  }
  g.position.set(cx, 0, cz); g.rotation.y = rot;
  scene.add(g);
}

makeCar(pumpCanopyX-5, pumpCanopyZ-4, 0, 0x2266aa);
makeCar(pumpCanopyX+5, pumpCanopyZ+4, Math.PI, 0x882222);
makeCar(pumpCanopyX-20, oz+D+15, Math.PI/2, 0x228844);
makeCar(pumpCanopyX+20, oz+D+15, -Math.PI/2, 0x444444);

// ==================== ORBIT CONTROLS ====================
let isRot=false,isPan=false,prev={x:0,y:0};
let oR=140,oT=Math.PI/4,oP=Math.PI/4,oTgt=new THREE.Vector3(0,4,0);
function updCam(){
  camera.position.set(oTgt.x+oR*Math.sin(oP)*Math.cos(oT),oTgt.y+oR*Math.cos(oP),oTgt.z+oR*Math.sin(oP)*Math.sin(oT));
  camera.lookAt(oTgt);
}
renderer.domElement.addEventListener('mousedown',e=>{if(e.button===0)isRot=true;if(e.button===2)isPan=true;prev={x:e.clientX,y:e.clientY};});
renderer.domElement.addEventListener('mousemove',e=>{
  const dx=e.clientX-prev.x,dy=e.clientY-prev.y;prev={x:e.clientX,y:e.clientY};
  if(isRot){oT-=dx*0.005;oP=Math.max(0.1,Math.min(Math.PI/2-0.05,oP-dy*0.005));}
  if(isPan){const r=new THREE.Vector3();camera.getWorldDirection(r);r.cross(new THREE.Vector3(0,1,0)).normalize();oTgt.addScaledVector(r,-dx*0.15);oTgt.y+=dy*0.15;}
});
renderer.domElement.addEventListener('mouseup',()=>{isRot=false;isPan=false;});
renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());
renderer.domElement.addEventListener('wheel',e=>{oR=Math.max(15,Math.min(300,oR+e.deltaY*0.1));});
let tS=null,tD=null;
renderer.domElement.addEventListener('touchstart',e=>{if(e.touches.length===1)tS={x:e.touches[0].clientX,y:e.touches[0].clientY};else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;tD=Math.sqrt(dx*dx+dy*dy);}});
renderer.domElement.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&tS){const dx=e.touches[0].clientX-tS.x,dy=e.touches[0].clientY-tS.y;oT-=dx*0.005;oP=Math.max(0.1,Math.min(Math.PI/2-0.05,oP-dy*0.005));tS={x:e.touches[0].clientX,y:e.touches[0].clientY};}else if(e.touches.length===2&&tD){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.sqrt(dx*dx+dy*dy);oR=Math.max(15,Math.min(300,oR*tD/d));tD=d;}},{passive:false});
renderer.domElement.addEventListener('touchend',()=>{tS=null;tD=null;});
function setView(v){document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');
  switch(v){case'orbit':oR=140;oT=Math.PI/4;oP=Math.PI/4;oTgt.set(0,4,0);break;case'topdown':oR=100;oT=0;oP=0.1;oTgt.set(0,0,0);break;case'interior':oR=35;oT=Math.PI*0.8;oP=Math.PI/3;oTgt.set(0,3,5);break;case'front':oR=100;oT=Math.PI/2;oP=Math.PI/5;oTgt.set(0,5,oz+D);break;}}
function animate(){requestAnimationFrame(animate);updCam();renderer.render(scene,camera);}
animate();
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
</script>
</body>
</html>
