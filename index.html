<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convenience Store 3D Walkthrough</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,30,0.85); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
    padding: 14px 24px; color: #ccc; font-size: 13px; z-index: 100;
    display: flex; gap: 20px; align-items: center;
  }
  #controls kbd {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 5px; padding: 2px 7px; font-family: monospace; font-size: 12px; color: #fff;
  }
  #info {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,30,0.85); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
    padding: 14px 28px; color: #fff; font-size: 18px; font-weight: 600;
    z-index: 100; letter-spacing: 0.5px;
  }
  #viewBtns {
    position: fixed; top: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 8px; z-index: 100;
  }
  .vbtn {
    background: rgba(10,10,30,0.85); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
    padding: 10px 18px; color: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .vbtn:hover { background: rgba(60,60,120,0.85); border-color: rgba(255,255,255,0.3); }
  .vbtn.active { background: rgba(80,80,180,0.85); border-color: rgba(150,150,255,0.5); }
</style>
</head>
<body>
<div id="info">Convenience Store — 3D Walkthrough</div>
<div id="viewBtns">
  <button class="vbtn active" onclick="setView('orbit')">Orbit View</button>
  <button class="vbtn" onclick="setView('topdown')">Top Down</button>
  <button class="vbtn" onclick="setView('interior')">Interior View</button>
  <button class="vbtn" onclick="setView('front')">Front View</button>
</div>
<div id="controls">
  <span><kbd>Left Click</kbd> + Drag to Rotate</span>
  <span><kbd>Right Click</kbd> + Drag to Pan</span>
  <span><kbd>Scroll</kbd> to Zoom</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ==================== SCENE ====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xd4dbe3);
scene.fog = new THREE.Fog(0xd4dbe3, 200, 500);
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dL = new THREE.DirectionalLight(0xffffff, 0.8);
dL.position.set(80,120,60); dL.castShadow = true;
dL.shadow.mapSize.set(2048,2048); dL.shadow.camera.near=1; dL.shadow.camera.far=300;
dL.shadow.camera.left=-120; dL.shadow.camera.right=120; dL.shadow.camera.top=120; dL.shadow.camera.bottom=-120;
scene.add(dL);
const fL = new THREE.DirectionalLight(0xb0c4de, 0.3); fL.position.set(-40,60,-30); scene.add(fL);
const iL1 = new THREE.PointLight(0xfff5e6, 0.8, 80); iL1.position.set(20,9,-15); scene.add(iL1);
const iL2 = new THREE.PointLight(0xfff5e6, 0.8, 80); iL2.position.set(-15,9,-15); scene.add(iL2);

// ==================== MATERIALS ====================
const wallMat = new THREE.MeshStandardMaterial({color:0xffffff, roughness:0.85});
const wallExtMat = new THREE.MeshStandardMaterial({color:0xe8e0d4, roughness:0.7});
const floorMat = new THREE.MeshStandardMaterial({color:0xd9cfc2, roughness:0.6});
const floorTileMat = new THREE.MeshStandardMaterial({color:0xc8bfb2, roughness:0.5});
const ceilingMat = new THREE.MeshStandardMaterial({color:0xf5f5f0, roughness:0.9, side:2});
const gondolaMat = new THREE.MeshStandardMaterial({color:0x3a3a3a, roughness:0.4, metalness:0.3});
const shelfMat = new THREE.MeshStandardMaterial({color:0xeeeeee, roughness:0.5});
const glassMat = new THREE.MeshStandardMaterial({color:0xaaddff, transparent:true, opacity:0.25, roughness:0.1});
const groundMat = new THREE.MeshStandardMaterial({color:0x888888, roughness:0.9});
const roofMat = new THREE.MeshStandardMaterial({color:0x8b7d6b, roughness:0.8});
const signMat = new THREE.MeshStandardMaterial({color:0xcc2222, roughness:0.4, metalness:0.3});
const doorMat = new THREE.MeshStandardMaterial({color:0x555555, roughness:0.3, metalness:0.4});
const bevFrameMat = new THREE.MeshStandardMaterial({color:0x2a2a2a, roughness:0.3, metalness:0.5});
const bevBodyMat = new THREE.MeshStandardMaterial({color:0xe0e4e8, roughness:0.4, metalness:0.3});
const bevGlassMat = new THREE.MeshStandardMaterial({color:0x99ccee, transparent:true, opacity:0.28, roughness:0.02});
const hotGlassMat = new THREE.MeshStandardMaterial({color:0xcceeff, transparent:true, opacity:0.3, roughness:0.05});
const hotFrameMat = new THREE.MeshStandardMaterial({color:0x333333, roughness:0.3, metalness:0.5});
const trayMat = new THREE.MeshStandardMaterial({color:0xc0c0c0, roughness:0.2, metalness:0.6});
const skinA = new THREE.MeshStandardMaterial({color:0xe8b89d, roughness:0.8});
const skinB = new THREE.MeshStandardMaterial({color:0x8d5524, roughness:0.8});
const skinC = new THREE.MeshStandardMaterial({color:0xc68642, roughness:0.8});

// ==================== DIMENSIONS ====================
const W=80.5, D=69, H=12, wallT=0.5;
const ox=-W/2, oz=-D/2;
const backWallZ = oz + 14; // prep kitchen divider

// ==================== HELPERS ====================
function mkWall(x,z,w,d,h,mat){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h||H,d),mat||wallMat);
  m.position.set(x+w/2,(h||H)/2,z+d/2); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m;
}
function mkBox(x,y,z,w,h,d,mat){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y+h/2,z); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m;
}

// ==================== GROUND / FLOOR / CEILING ====================
const gnd=new THREE.Mesh(new THREE.PlaneGeometry(400,400),groundMat);
gnd.rotation.x=-Math.PI/2; gnd.position.y=-0.1; gnd.receiveShadow=true; scene.add(gnd);
for(let i=0;i<8;i++){const l=new THREE.Mesh(new THREE.PlaneGeometry(0.3,18),new THREE.MeshStandardMaterial({color:0xcccccc}));l.rotation.x=-Math.PI/2;l.position.set(ox+10+i*9,0.01,oz+D+20);scene.add(l);}

const fl=new THREE.Mesh(new THREE.PlaneGeometry(W,D),floorMat);
fl.rotation.x=-Math.PI/2; fl.receiveShadow=true; scene.add(fl);
for(let ix=0;ix<W;ix+=4)for(let iz=0;iz<D;iz+=4)if((Math.floor(ix/4)+Math.floor(iz/4))%2===0){
  const t=new THREE.Mesh(new THREE.PlaneGeometry(4,4),floorTileMat);t.rotation.x=-Math.PI/2;t.position.set(ox+ix+2,0.02,oz+iz+2);t.receiveShadow=true;scene.add(t);
}

const cl=new THREE.Mesh(new THREE.PlaneGeometry(W,D),ceilingMat);
cl.rotation.x=Math.PI/2; cl.position.y=H; scene.add(cl);
for(let ix=0;ix<4;ix++)for(let iz=0;iz<3;iz++){
  const f=new THREE.Mesh(new THREE.BoxGeometry(4,0.3,1.5),new THREE.MeshStandardMaterial({color:0xffffee,emissive:0xffffdd,emissiveIntensity:0.5}));
  f.position.set(ox+12+ix*18,H-0.2,oz+12+iz*20);scene.add(f);
}

// ==================== EXTERIOR WALLS ====================
mkWall(ox,oz,W,wallT,H,wallExtMat);          // back
mkWall(ox+W-wallT,oz,wallT,D,H,wallExtMat);  // right
mkWall(ox,oz,wallT,D,H,wallExtMat);           // left
const sfLeft=20, sfRight=54, sfW=sfRight-sfLeft;
mkWall(ox,oz+D-wallT,sfLeft,wallT,H,wallExtMat);
mkWall(ox+sfRight,oz+D-wallT,W-sfRight,wallT,H,wallExtMat);
const hdr=mkWall(ox+sfLeft,oz+D-wallT,sfW,wallT,2,wallExtMat); hdr.position.y=H-1;

// Storefront glass & doors
for(let i=0;i<4;i++){
  const pw=sfW/4;
  const p=new THREE.Mesh(new THREE.PlaneGeometry(pw-0.5,H-3),glassMat);
  p.position.set(ox+sfLeft+pw*i+pw/2,(H-3)/2+0.5,oz+D-0.2);scene.add(p);
  const fr=new THREE.Mesh(new THREE.BoxGeometry(0.3,H-2,0.3),new THREE.MeshStandardMaterial({color:0x444444,metalness:0.5}));
  fr.position.set(ox+sfLeft+pw*i,(H-2)/2+0.5,oz+D-0.2);scene.add(fr);
}
const doorX=ox+sfLeft+sfW/2;
{const _m=new THREE.Mesh(new THREE.BoxGeometry(6,8,0.4),doorMat);_m.position.set(doorX,4,oz+D);scene.add(_m);}
for(let s=-1;s<=1;s+=2){const dg=new THREE.Mesh(new THREE.PlaneGeometry(2.5,6.5),glassMat);dg.position.set(doorX+s*1.5,4,oz+D+0.25);scene.add(dg);}

// ==================== BACK DIVIDER WALL ====================
// Spans full width — coolers sit in front of it on the left portion
mkWall(ox, backWallZ, W, wallT, H, wallMat);

// ==================== COOLER HELPERS ====================
const bevColors=[0xcc0000,0x0044aa,0x00aa44,0xffcc00,0xff6600,0x8800cc];
const cH=8, cD=3;

function coolerZ(cx,cz,n,dir){
  // Body spans X, doors face Z direction (dir=1 or -1)
  const dw=3,tw=n*dw;
  mkBox(cx,0,cz,tw,cH,cD,bevBodyMat);
  mkBox(cx,cH,cz,tw+0.3,0.4,cD+0.2,bevFrameMat);
  mkBox(cx,0,cz,tw+0.3,0.5,cD+0.2,bevFrameMat);
  for(let d=0;d<n;d++){
    const dx=cx-tw/2+dw/2+d*dw, fz=cz+dir*(cD/2+0.05);
    const df=new THREE.Mesh(new THREE.BoxGeometry(dw+0.15,cH-0.5,0.2),bevFrameMat);df.position.set(dx,cH/2,fz);scene.add(df);
    const gp=new THREE.Mesh(new THREE.PlaneGeometry(dw-0.6,cH-1.5),bevGlassMat);gp.position.set(dx,cH/2+0.2,fz+dir*0.15);scene.add(gp);
    const h=new THREE.Mesh(new THREE.BoxGeometry(0.12,3,0.3),new THREE.MeshStandardMaterial({color:0x888888,metalness:0.7,roughness:0.2}));
    h.position.set(dx+dw/2-0.5,cH/2,fz+dir*0.3);scene.add(h);
    for(let s=0;s<5;s++){
      const sy=1+s*1.4;
      const sh=new THREE.Mesh(new THREE.BoxGeometry(dw-0.4,0.08,cD-0.6),new THREE.MeshStandardMaterial({color:0xd0d0d0}));
      sh.position.set(dx,sy,cz);scene.add(sh);
      for(let b=0;b<4;b++){
        const bt=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.25,0.9,6),new THREE.MeshStandardMaterial({color:bevColors[(d+s+b)%6],roughness:0.4}));
        bt.position.set(dx-1+b*0.65,sy+0.5,cz+dir*0.5);scene.add(bt);
      }
    }
  }
  {const _m=new THREE.PointLight(0x88bbff,0.2,10);_m.position.set(cx,cH-1,cz);scene.add(_m);}
}

function coolerX(cx,cz,n,dir){
  // Body spans Z, doors face X direction (dir=1 or -1)
  const dw=3,tl=n*dw;
  mkBox(cx,0,cz,cD,cH,tl,bevBodyMat);
  mkBox(cx,cH,cz,cD+0.2,0.4,tl+0.3,bevFrameMat);
  mkBox(cx,0,cz,cD+0.2,0.5,tl+0.3,bevFrameMat);
  for(let d=0;d<n;d++){
    const dz=cz-tl/2+dw/2+d*dw, fx=cx+dir*(cD/2+0.05);
    const df=new THREE.Mesh(new THREE.BoxGeometry(0.2,cH-0.5,dw+0.15),bevFrameMat);df.position.set(fx,cH/2,dz);scene.add(df);
    const gp=new THREE.Mesh(new THREE.PlaneGeometry(dw-0.6,cH-1.5),bevGlassMat);
    gp.rotation.y=Math.PI/2;gp.position.set(fx+dir*0.15,cH/2+0.2,dz);scene.add(gp);
    const h=new THREE.Mesh(new THREE.BoxGeometry(0.3,3,0.12),new THREE.MeshStandardMaterial({color:0x888888,metalness:0.7,roughness:0.2}));
    h.position.set(fx+dir*0.3,cH/2,dz+dw/2-0.5);scene.add(h);
    for(let s=0;s<5;s++){
      const sy=1+s*1.4;
      const sh=new THREE.Mesh(new THREE.BoxGeometry(cD-0.6,0.08,dw-0.4),new THREE.MeshStandardMaterial({color:0xd0d0d0}));
      sh.position.set(cx,sy,dz);scene.add(sh);
      for(let b=0;b<4;b++){
        const bt=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.25,0.9,6),new THREE.MeshStandardMaterial({color:bevColors[(d+s+b)%6],roughness:0.4}));
        bt.position.set(cx+dir*0.5,sy+0.5,dz-1+b*0.65);scene.add(bt);
      }
    }
  }
  {const _m=new THREE.PointLight(0x88bbff,0.2,10);_m.position.set(cx,cH-1,cz);scene.add(_m);}
}

// ==================== RED: L-SHAPED COOLER DOORS ====================
// Full continuous wall of glass doors — tight L-shape with only a small 2-door gap for hallway
// Each door is 3' wide.

// BACK WALL coolers — sit in front of back divider, doors face +Z into store
coolerZ(ox+15, backWallZ+2, 9, 1);

// LEFT WALL — starts right at back divider level, runs down to entrance
// Upper section: 9 doors starting from backWallZ+2 downward
coolerX(ox+2.5, backWallZ+15.5, 9, 1);

// === HALLWAY GAP: 6' (2 door widths) for restroom access ===

// Lower section: 10 doors continuing after gap, ending before the front wall
// Upper section ends at backWallZ+15.5+13.5 = oz+43. Gap = 6'. Lower starts at oz+49.
// Front wall at oz+69. So lower section = oz+49 to oz+67 = 18' = 6 doors, centered at oz+58
coolerX(ox+2.5, backWallZ+15.5+13.5+6+9, 6, 1);

// Restrooms are behind the back divider wall — no walls visible on the retail floor

// ==================== YELLOW: SHOW KITCHEN COUNTER + HOT FOOD CASES ====================
// Horizontal counter along back divider, right portion
const fcStartX = ox+30, fcEndX = ox+W-10, fcW = fcEndX-fcStartX;
const fcZ = backWallZ+1.5;
const fcMat = new THREE.MeshStandardMaterial({color:0x555555, roughness:0.3, metalness:0.3});

mkBox(fcStartX+fcW/2, 0, fcZ, fcW, 3, 2.5, fcMat);

for(let i=0; i<5; i++){
  const cx = fcStartX+4+i*(fcW-6)/5;
  const cw = (fcW-8)/5-0.5, cy=3, ch=2.5, cd=2;
  // Front glass
  {const _m=new THREE.Mesh(new THREE.PlaneGeometry(cw,ch),hotGlassMat);_m.position.set(cx,cy+ch/2,fcZ+cd/2+0.01);scene.add(_m);}
  // Sneeze guard
  const tg=new THREE.Mesh(new THREE.PlaneGeometry(cw,cd+0.5),hotGlassMat);tg.rotation.x=-Math.PI/6;tg.position.set(cx,cy+ch+0.3,fcZ+0.2);scene.add(tg);
  // Side glass
  for(let s=-1;s<=1;s+=2){const sg=new THREE.Mesh(new THREE.PlaneGeometry(cd,ch),hotGlassMat);sg.rotation.y=Math.PI/2;sg.position.set(cx+s*cw/2,cy+ch/2,fcZ);scene.add(sg);}
  // Corners
  for(let s=-1;s<=1;s+=2){{const _m=new THREE.Mesh(new THREE.BoxGeometry(0.15,ch,0.15),hotFrameMat);_m.position.set(cx+s*cw/2,cy+ch/2,fcZ+cd/2);scene.add(_m);};}
  // Tray & food
  mkBox(cx,cy,fcZ,cw-0.3,0.15,cd-0.3,trayMat);
  const fColors=[0xd4890a,0xb5651d,0xcc4422,0xe8a020];
  for(let fi=0;fi<3;fi++){
    const f=new THREE.Mesh(new THREE.BoxGeometry(1.2,0.6,1),new THREE.MeshStandardMaterial({color:fColors[(i+fi)%4],roughness:0.8}));
    f.position.set(cx-1.5+fi*1.5,cy+0.5,fcZ);scene.add(f);
  }
  {const _m=new THREE.PointLight(0xffaa44,0.2,8);_m.position.set(cx,cy+ch-0.3,fcZ);scene.add(_m);}
}

// ==================== YELLOW: CASHIER POS COUNTER (right side, vertical) ====================
const posX = ox+W-6;
const posSZ = oz+28, posEZ = oz+D-8, posL = posEZ-posSZ;
const posMat = new THREE.MeshStandardMaterial({color:0x5a5a5a, roughness:0.25, metalness:0.3});

mkBox(posX, 0, posSZ+posL/2, 4, 3, posL, posMat);

// Shelving behind (against right wall)
for(let i=0;i<4;i++) mkBox(ox+W-1.5, 0, posSZ+3+i*(posL/4), 2, 7, posL/4-1, shelfMat);

// POS Registers
const pScrMat = new THREE.MeshStandardMaterial({color:0x111111,roughness:0.2,metalness:0.5});
const pDspMat = new THREE.MeshStandardMaterial({color:0x2244aa,emissive:0x112244,emissiveIntensity:0.4});
for(let r=0;r<3;r++){
  const rz=posSZ+6+r*10, ry=3;
  {const _m=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.2,0.8),pScrMat);_m.position.set(posX,ry+0.1,rz);scene.add(_m);}
  {const _m=new THREE.Mesh(new THREE.BoxGeometry(0.15,1.2,0.15),pScrMat);_m.position.set(posX,ry+0.8,rz);scene.add(_m);}
  const scr=new THREE.Mesh(new THREE.BoxGeometry(0.12,1.5,2),pScrMat);scr.position.set(posX-0.2,ry+1.8,rz);scr.castShadow=true;scene.add(scr);
  const dsp=new THREE.Mesh(new THREE.PlaneGeometry(1.7,1.2),pDspMat);dsp.rotation.y=-Math.PI/2;dsp.position.set(posX-0.3,ry+1.8,rz);scene.add(dsp);
  // Card reader
  {const _m=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.3,0.5),new THREE.MeshStandardMaterial({color:0x222222,roughness:0.3,metalness:0.4}));_m.position.set(posX-1.5,ry+0.15,rz);scene.add(_m);}
  const rs=new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.35),new THREE.MeshStandardMaterial({color:0x44aa66,emissive:0x22aa44,emissiveIntensity:0.3}));
  rs.rotation.y=-Math.PI/2;rs.position.set(posX-1.9,ry+0.35,rz);scene.add(rs);
}

// ==================== YELLOW: COFFEE + FOUNTAIN SODA (bottom-right near entrance) ====================
const cofX = ox+W-16, cofZ = oz+D-5;
const cofMat = new THREE.MeshStandardMaterial({color:0x5a5a5a, roughness:0.25, metalness:0.3});
mkBox(cofX, 0, cofZ, 14, 3, 3, cofMat);

// Coffee machines (3)
for(let i=0;i<3;i++){
  const cx=cofX-5+i*3;
  const cm=new THREE.Mesh(new THREE.BoxGeometry(2,2.5,1.8),new THREE.MeshStandardMaterial({color:0x222222,roughness:0.3,metalness:0.5}));
  cm.position.set(cx,4.25,cofZ-0.3);cm.castShadow=true;scene.add(cm);
  // Pot
  {const _m=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.35,1,8),new THREE.MeshStandardMaterial({color:0x111111,roughness:0.2,metalness:0.3}));_m.position.set(cx,3.5,cofZ+0.8);scene.add(_m);}
  {const _m=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.3,0.6,8),new THREE.MeshStandardMaterial({color:0x4a2c0a,roughness:0.9}));_m.position.set(cx,3.3,cofZ+0.8);scene.add(_m);}
}

// Fountain soda dispenser
const sodaX=cofX+5;
const soda=new THREE.Mesh(new THREE.BoxGeometry(3,3,2),new THREE.MeshStandardMaterial({color:0xcccccc,roughness:0.2,metalness:0.5}));
soda.position.set(sodaX,4.5,cofZ-0.2);soda.castShadow=true;scene.add(soda);
for(let n=0;n<4;n++){
  {const _m=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,0.5,6),new THREE.MeshStandardMaterial({color:0x444444,metalness:0.6}));_m.position.set(sodaX-1+n*0.7,3.25,cofZ+0.5);scene.add(_m);}
}
mkBox(sodaX,3,cofZ+0.5,3,0.1,1,new THREE.MeshStandardMaterial({color:0x999999,roughness:0.3,metalness:0.4}));
const brandC=[0xcc0000,0x004499,0x00aa00,0xff8800];
for(let b=0;b<4;b++){const bp=new THREE.Mesh(new THREE.PlaneGeometry(0.6,1.5),new THREE.MeshStandardMaterial({color:brandC[b]}));bp.position.set(sodaX-1+b*0.7,5,cofZ+1.05);scene.add(bp);}
// Cups & lids
{const _m=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.45,2,8),new THREE.MeshStandardMaterial({color:0xeeeeee,roughness:0.5}));_m.position.set(sodaX+2,4,cofZ);scene.add(_m);}
{const _m=new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.55,0.5,8),new THREE.MeshStandardMaterial({color:0x333333,roughness:0.4}));_m.position.set(sodaX+2,3.25,cofZ+0.8);scene.add(_m);}

// ==================== GONDOLA SHELVING ====================
const gRows=5, gLen=28, gSpc=7, gSX=ox+14, gSZ=oz+24;
for(let row=0;row<gRows;row++){
  const gz=gSZ+row*gSpc;
  const sp=new THREE.Mesh(new THREE.BoxGeometry(gLen,5.5,0.3),gondolaMat);
  sp.position.set(gSX+gLen/2,2.75,gz);sp.castShadow=true;scene.add(sp);
  for(let s=0;s<4;s++){
    const sy=0.8+s*1.3;
    for(let side=-1;side<=1;side+=2){
      const sh=new THREE.Mesh(new THREE.BoxGeometry(gLen,0.1,1.3),shelfMat);
      sh.position.set(gSX+gLen/2,sy,gz+side*0.8);sh.receiveShadow=true;scene.add(sh);
    }
  }
  for(let e=0;e<=1;e++){const ec=new THREE.Mesh(new THREE.BoxGeometry(0.3,5.5,3),gondolaMat);ec.position.set(gSX+e*gLen,2.75,gz);ec.castShadow=true;scene.add(ec);}
  const pColors=[0xcc3333,0x3366cc,0x33aa55,0xeeaa22,0x9944aa,0xdd6633];
  for(let s=0;s<4;s++)for(let p=0;p<8;p++){
    const pw=gLen/8;
    const pr=new THREE.Mesh(new THREE.BoxGeometry(pw-0.3,1,1),new THREE.MeshStandardMaterial({color:pColors[(row+s+p)%6],roughness:0.7}));
    pr.position.set(gSX+pw*p+pw/2,0.9+s*1.3+0.55,gz+0.8);scene.add(pr);
  }
}

// ==================== PEOPLE ====================
function mkPerson(px,py,pz,rot,shirt,pants,skin,isEmp){
  const g=new THREE.Group();
  const pantsMat=new THREE.MeshStandardMaterial({color:pants,roughness:0.7});
  const shirtMat=new THREE.MeshStandardMaterial({color:shirt,roughness:0.6});
  // Legs
  for(let s=-1;s<=1;s+=2){const l=new THREE.Mesh(new THREE.BoxGeometry(0.5,2.5,0.5),pantsMat);l.position.set(s*0.3,1.25,0);l.castShadow=true;g.add(l);}
  // Torso
  const t=new THREE.Mesh(new THREE.BoxGeometry(1.2,1.8,0.7),shirtMat);t.position.set(0,3.4,0);t.castShadow=true;g.add(t);
  // Head
  const hd=new THREE.Mesh(new THREE.SphereGeometry(0.45,8,8),skin);hd.position.set(0,4.75,0);hd.castShadow=true;g.add(hd);
  // Hair
  const hr=new THREE.Mesh(new THREE.SphereGeometry(0.47,8,4,0,Math.PI*2,0,Math.PI/2),new THREE.MeshStandardMaterial({color:isEmp?0x222222:0x4a3728,roughness:0.8}));
  hr.position.set(0,4.85,0);g.add(hr);
  // Arms
  for(let s=-1;s<=1;s+=2){
    const a=new THREE.Mesh(new THREE.BoxGeometry(0.35,1.6,0.35),shirtMat);a.position.set(s*0.85,3.2,0);a.castShadow=true;g.add(a);
    const h=new THREE.Mesh(new THREE.SphereGeometry(0.18,6,6),skin);h.position.set(s*0.85,2.3,0);g.add(h);
  }
  // Apron for employees
  if(isEmp){const ap=new THREE.Mesh(new THREE.BoxGeometry(1.1,1.5,0.1),new THREE.MeshStandardMaterial({color:0x1a5c1a,roughness:0.7}));ap.position.set(0,3,0.4);g.add(ap);}
  g.position.set(px,py,pz); g.rotation.y=rot; scene.add(g); return g;
}

// 2 Cashiers behind POS counter (standing between counter and right wall)
mkPerson(posX+2.5, 0, posSZ+10, -Math.PI/2, 0x2255aa, 0x222222, skinA, true);
mkPerson(posX+2.5, 0, posSZ+22, -Math.PI/2, 0x2255aa, 0x222222, skinB, true);

mkPerson(fcStartX+25, 0, fcZ-3, Math.PI, 0x2255aa, 0x222222, skinA, true);

// Customers
mkPerson(ox+22, 0, oz+32, 0.3, 0xcc3333, 0x333366, skinA, false);        // browsing gondola
mkPerson(ox+32, 0, oz+42, -0.5, 0x33aa55, 0x444444, skinB, false);       // browsing gondola
mkPerson(ox+10, 0, oz+44, 1.2, 0xff8800, 0x222244, skinC, false);        // at left coolers

roof.position.set(0,H+0.4,0);roof.castShadow=true;scene.add(roof);
const pH=2;

mkWall(ox-1,oz+D,W+2,wallT,pH,wallExtMat).position.y+=H;
mkWall(ox-1,oz-1,wallT,D+2,pH,wallExtMat).position.y+=H;

const canopy=new THREE.Mesh(new THREE.BoxGeometry(sfW+6,0.4,8),new THREE.MeshStandardMaterial({color:0xcc2222,roughness:0.5,metalness:0.2}));
canopy.position.set(ox+sfLeft+sfW/2,H-1,oz+D+4);canopy.castShadow=true;scene.add(canopy);
for(let i=0;i<4;i++){const p=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,H-1,8),new THREE.MeshStandardMaterial({color:0x888888,metalness:0.4}));p.position.set(ox+sfLeft+3+i*(sfW/3),(H-1)/2,oz+D+7);p.castShadow=true;scene.add(p);}
{const _m=new THREE.Mesh(new THREE.BoxGeometry(20,3,0.5),signMat);_m.position.set(ox+sfLeft+sfW/2,H+1.5,oz+D+8);_m.castShadow=true;scene.add(_m);}

// ==================== ORBIT CONTROLS ====================
let isRot=false,isPan=false,prev={x:0,y:0};
let oR=140,oT=Math.PI/4,oP=Math.PI/4,oTgt=new THREE.Vector3(0,4,0);
function updCam(){
  camera.position.set(oTgt.x+oR*Math.sin(oP)*Math.cos(oT),oTgt.y+oR*Math.cos(oP),oTgt.z+oR*Math.sin(oP)*Math.sin(oT));
  camera.lookAt(oTgt);
}
renderer.domElement.addEventListener('mousedown',e=>{if(e.button===0)isRot=true;if(e.button===2)isPan=true;prev={x:e.clientX,y:e.clientY};});
renderer.domElement.addEventListener('mousemove',e=>{
  const dx=e.clientX-prev.x,dy=e.clientY-prev.y;prev={x:e.clientX,y:e.clientY};
  if(isRot){oT-=dx*0.005;oP=Math.max(0.1,Math.min(Math.PI/2-0.05,oP-dy*0.005));}
  if(isPan){const r=new THREE.Vector3();camera.getWorldDirection(r);r.cross(new THREE.Vector3(0,1,0)).normalize();oTgt.addScaledVector(r,-dx*0.15);oTgt.y+=dy*0.15;}
});
renderer.domElement.addEventListener('mouseup',()=>{isRot=false;isPan=false;});
renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());
renderer.domElement.addEventListener('wheel',e=>{oR=Math.max(15,Math.min(300,oR+e.deltaY*0.1));});
let tS=null,tD=null;
renderer.domElement.addEventListener('touchstart',e=>{if(e.touches.length===1)tS={x:e.touches[0].clientX,y:e.touches[0].clientY};else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;tD=Math.sqrt(dx*dx+dy*dy);}});
renderer.domElement.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&tS){const dx=e.touches[0].clientX-tS.x,dy=e.touches[0].clientY-tS.y;oT-=dx*0.005;oP=Math.max(0.1,Math.min(Math.PI/2-0.05,oP-dy*0.005));tS={x:e.touches[0].clientX,y:e.touches[0].clientY};}else if(e.touches.length===2&&tD){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.sqrt(dx*dx+dy*dy);oR=Math.max(15,Math.min(300,oR*tD/d));tD=d;}},{passive:false});
renderer.domElement.addEventListener('touchend',()=>{tS=null;tD=null;});
function setView(v){document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');
  switch(v){case'orbit':oR=140;oT=Math.PI/4;oP=Math.PI/4;oTgt.set(0,4,0);break;case'topdown':oR=100;oT=0;oP=0.1;oTgt.set(0,0,0);break;case'interior':oR=35;oT=Math.PI*0.8;oP=Math.PI/3;oTgt.set(0,3,5);break;case'front':oR=100;oT=Math.PI/2;oP=Math.PI/5;oTgt.set(0,5,oz+D);break;}}
function animate(){requestAnimationFrame(animate);updCam();renderer.render(scene,camera);}
animate();
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
</script>
